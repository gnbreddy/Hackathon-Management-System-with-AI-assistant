spring.application.name=ehub

# PostgreSQL Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ehub_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ehub_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ehub_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email / SMTP Settings (for OTP)
# Replace with your Gmail credentials and App Password (not your login password)
# To create an App Password: Google Account -> Security -> 2-Step Verification -> App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# If mail is not configured, OTP will be printed to Docker logs as fallback

# Import local configuration
spring.config.import=optional:classpath:application-local.properties