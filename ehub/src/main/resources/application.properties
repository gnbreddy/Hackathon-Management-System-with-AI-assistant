spring.application.name=ehub

# ─────────────────────────────────────────────────────────────
# PostgreSQL Database Connection
# Railway provides DATABASE_URL as: postgresql://user:pass@host:port/db
# We convert it to a JDBC URL in DataSourceConfig.java if present.
# For local Docker Compose we fall back to individual vars below.
# ─────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ehub_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ehub_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ehub_password}
# spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email / SMTP Settings (for OTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Import local configuration (optional, for local dev overrides)
spring.config.import=optional:classpath:application-local.properties

# Gemini AI API Key
gemini.api.key=${GEMINI_API_KEY}

# JWT Secret
jwt.secret=${JWT_SECRET}